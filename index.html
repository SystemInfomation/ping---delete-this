<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructure Endpoint Monitor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 30px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0,0,0,0.3);
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .online {
      color: #22c55e;
    }

    .offline {
      color: #ef4444;
    }

    .meta {
      margin-top: 10px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Instructure Endpoint Monitor</h1>

  <div class="grid" id="grid"></div>

  <script>
    const endpoints = [
      'https://api.instructure.com',
      'https://backend.instructure.com',
      'https://frontend.instructure.com',
      'https://auth.instructure.com',
      'https://forsyth.instructure.com'
    ];

    const grid = document.getElementById('grid');

    function createCards() {
      endpoints.forEach((url, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${index}`;

        card.innerHTML = `
          <div class="title">${url}</div>
          <div id="status-${index}">Checking...</div>
          <div class="meta" id="meta-${index}"></div>
        `;

        grid.appendChild(card);
      });
    }

    async function pingEndpoint(url, index) {
      const statusEl = document.getElementById(`status-${index}`);
      const metaEl = document.getElementById(`meta-${index}`);

      const start = performance.now();

      try {
        const response = await fetch(url, {
          method: 'GET',
          mode: 'cors'
        });

        const latency = Math.round(performance.now() - start);

        statusEl.innerHTML = `<span class="online">ONLINE</span>`;

        metaEl.innerHTML = `
          Status Code: ${response.status}<br>
          Response Time: ${latency}ms<br>
          Last Checked: ${new Date().toLocaleTimeString()}
        `;
      } catch (error) {
        const latency = Math.round(performance.now() - start);

        statusEl.innerHTML = `<span class="offline">OFFLINE / BLOCKED</span>`;

        metaEl.innerHTML = `
          Error: ${error.message}<br>
          Response Time: ${latency}ms<br>
          Last Checked: ${new Date().toLocaleTimeString()}
        `;
      }
    }

    function runChecks() {
      endpoints.forEach((url, index) => {
        pingEndpoint(url, index);
      });
    }

    createCards();
    runChecks();

    // Check every 10 seconds
    setInterval(runChecks, 100);
  </script>
</body>
</html>
