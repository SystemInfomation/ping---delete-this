# Safe API Status Monitor for Instructure API

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instructure API Status Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      width: 420px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .status {
      font-size: 20px;
      margin: 15px 0;
    }

    .online {
      color: #22c55e;
    }

    .offline {
      color: #ef4444;
    }

    .details {
      color: #cbd5e1;
      font-size: 14px;
      margin-top: 10px;
      word-break: break-word;
    }

    button {
      margin-top: 20px;
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Instructure API Monitor</h1>

    <div id="status" class="status">Checking...</div>

    <div class="details" id="details"></div>

    <button onclick="checkAPI()">Check Now</button>
  </div>

  <script>
    const API_URL = 'https://api.instructure.com';

    async function checkAPI() {
      const statusEl = document.getElementById('status');
      const detailsEl = document.getElementById('details');

      statusEl.textContent = 'Checking...';
      statusEl.className = 'status';

      const start = performance.now();

      try {
        const response = await fetch(API_URL, {
          method: 'GET',
          mode: 'cors'
        });

        const latency = Math.round(performance.now() - start);

        statusEl.textContent = 'API Reachable';
        statusEl.classList.add('online');

        detailsEl.innerHTML = `
          Status Code: ${response.status}<br>
          Response Time: ${latency} ms<br>
          Last Checked: ${new Date().toLocaleTimeString()}
        `;
      } catch (error) {
        statusEl.textContent = 'API Unreachable';
        statusEl.classList.add('offline');

        detailsEl.innerHTML = `
          Error: ${error.message}<br>
          Last Checked: ${new Date().toLocaleTimeString()}
        `;
      }
    }

    // Safe monitoring interval (once every 60 seconds)
    checkAPI();
    setInterval(checkAPI, 10);
  </script>
</body>
</html>
```

This example performs low-frequency health checks suitable for uptime monitoring and testing without overwhelming the target service.
